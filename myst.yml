version: 1

project:
  id: cuadernos-reproducibles-crc005
  title: "Detección de Inundaciones con Sentinel-1 SAR y Google Earth Engine"
  short_title: "Inundaciones Sentinel-1"
  description: >-
    Cuaderno reproducible para la detección de inundaciones durante el fenómeno
    La Niña 2021–2022 en Colombia, usando imágenes SAR del satélite Sentinel-1
    procesadas en Google Earth Engine. Implementa un algoritmo de cambio de
    backscatter para mapear la extensión de inundación por departamento y
    generar series de tiempo del agua superficial con el dataset JRC.

  authors:
    - name: Subdirección para el Conocimiento del Riesgo
      affiliations:
        - ungrd

  affiliations:
    - id: ungrd
      institution: Unidad Nacional para la Gestión del Riesgo de Desastres
      department: Subdirección de Conocimiento del Riesgo
      city: Bogotá
      country: Colombia
      url: https://www.gestiondelriesgo.gov.co
      ror: ""

  date: 2026-01-01

  keywords:
    - Google Earth Engine
    - Sentinel-1
    - SAR
    - inundaciones
    - Colombia
    - La Niña
    - geemap
    - teledetección
    - radar de apertura sintética
    - JRC water
    - backscatter
    - riesgo de desastres
    - UNGRD

  subject: "Flood mapping & disaster risk assessment"

  venue:
    title: "Riesgos · UNGRD Cuadernos Reproducibles"
    short_title: "Riesgos UNGRD"
    url: https://scr-ungrd.github.io/riesgos

  license:
    code: MIT
    content: CC-BY-SA-4.0

  open_access: true

  github: https://github.com/scr-ungrd/cuadernos-reproducibles-crc005
  binder: https://mybinder.org/v2/gh/scr-ungrd/cuadernos-reproducibles-crc005/main
  banner: ./images/banner.png

  # doi: ""  # diligenciar tras release v0.1.0 en Zenodo

  bibliography:
    - references.bib

  downloads:
