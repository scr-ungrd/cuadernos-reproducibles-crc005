      template: agu-journal
      output: exports/article-agu.pdf
      article: gee-inundaciones-sentinel1.ipynb
    - format: jats
      output: exports/article.xml
      article: gee-inundaciones-sentinel1.ipynb
    - format: meca
      output: exports/article.meca.zip
      article: gee-inundaciones-sentinel1.ipynb
    - format: typst
      article: gee-inundaciones-sentinel1.ipynb
      output: article.pdf
      template: ./_templates/plain-typst-article
      id: article-pdf

  toc:
